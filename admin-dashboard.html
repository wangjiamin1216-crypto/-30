<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>大宗商品管理中心门户 - 紧凑版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <style>
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .animate-scroll {
      animation: scroll 25s linear infinite;
    }

    .animate-scroll:hover {
      animation-play-state: paused;
    }

    @keyframes scroll {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-50%);
      }
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            industrial: {
              50: '#F5F7FA',
              100: '#E4E7EB',
              800: '#1E293B',
              900: '#0F172A',
              950: '#0B0F19'
            },
            accent: {
              DEFAULT: '#0ea5e9',
              hover: '#0284c7'
            }
          }
        }
      }
    }
  </script>
</head>

<body
  class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-[#0B0F19] dark:text-gray-100 font-sans overflow-hidden">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SidebarItem = ({ icon, text, active }) => (
      <div className={`flex items-center px-4 py-3 cursor-pointer transition-all border-l-4 ${active ? 'border-accent bg-blue-500/10 text-accent font-bold' : 'border-transparent text-gray-400 hover:text-gray-200 hover:bg-white/5'}`}>
        <span className="text-lg mr-3">{icon}</span>
        <span className="tracking-wide text-[13px]">{text}</span>
      </div>
    );

    function Tooltip({ children, content }) {
      const [show, setShow] = useState(false);
      return (
        <div className="relative flex items-center" onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
          {children}
          {show && (
            <div className="absolute z-50 left-full ml-4 w-64 p-3 bg-slate-800 text-white text-xs rounded shadow-2xl border border-slate-700 pointer-events-none">
              <div className="absolute -left-1.5 top-1/2 -mt-1.5 border-t-8 border-b-8 border-r-8 border-transparent border-r-slate-800"></div>
              {content}
            </div>
          )}
        </div>
      );
    }

    const Dashboard = () => {
      const [isDark, setIsDark] = useState(true);
      const [time, setTime] = useState(new Date());

      useEffect(() => {
        if (isDark) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [isDark]);

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const formatDate = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const ws = ['日', '一', '二', '三', '四', '五', '六'];
        const week = `星期${ws[date.getDay()]}`;
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const seconds = String(date.getSeconds()).padStart(2, '0');
        return `${year}年${month}月${day}日 ${week} ${hours}:${minutes}:${seconds}`;
      };

      const transactions = [
        { buyer: "府谷金茂镁业", price: 830, time: "2分钟前" },
        { buyer: "神木天元化工", price: 835, time: "5分钟前" },
        { buyer: "内蒙君正能源", price: 825, time: "18分钟前" },
        { buyer: "鄂尔多斯电力", price: 830, time: "30分钟前" },
        { buyer: "山西焦煤集团", price: 840, time: "1小时前" },
        { buyer: "陕煤运销集团", price: 830, time: "2小时前" },
        { buyer: "华阳新材料", price: 828, time: "3小时前" },
        { buyer: "国家能源集团", price: 835, time: "3.5小时前" },
      ];
      const allTx = [...transactions, ...transactions];

      return (
        <div className="flex h-screen w-screen overflow-hidden text-[13px]">
          {/* 左侧边栏 (恢复原始宽度) */}
          <div className={`w-64 flex-shrink-0 transition-colors duration-300 flex flex-col shadow-xl z-20 ${isDark ? 'bg-[#0F172A] border-r border-slate-800' : 'bg-white border-r border-gray-200'}`}>
            <div className="h-14 flex items-center justify-center border-b border-white/5 dark:border-slate-800">
              <div className="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 font-mono tracking-wider">
                佬司机大宗商品交易平台<span className="text-sm font-normal text-gray-400 ml-1"></span>
              </div>
            </div>

            <div className="flex-1 py-4 space-y-1 overflow-y-auto hide-scrollbar">
              <div className="text-xs font-bold text-gray-500 uppercase px-6 pb-2 tracking-widest">功能模块</div>
              <SidebarItem icon="☁️" text="云仓" active={false} />
              <SidebarItem icon="🔨" text="拍卖管理" active={true} />
              <SidebarItem icon="📝" text="订单处理" active={false} />
              <SidebarItem icon="👥" text="买家中心" active={false} />
              <SidebarItem icon="📄" text="合同管理" active={false} />
              <SidebarItem icon="🔴" text="印章管理" active={false} />
            </div>

            <div className="p-4 border-t border-white/5 dark:border-slate-800">
              <button onClick={() => setIsDark(!isDark)} className={`w-full py-2.5 px-3 rounded-lg text-sm flex items-center justify-center font-bold transition-all ${isDark ? 'bg-slate-800 text-gray-300 hover:bg-slate-700' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                {isDark ? '切换浅色' : '切换深色'}
              </button>
            </div>
          </div>

          {/* 右侧主内容区 */}
          <div className="flex-1 flex flex-col h-full overflow-hidden bg-gray-50 dark:bg-[#06090e]">

            {/* 顶栏 (精简高度) */}
            <div className={`h-14 flex items-center justify-between px-6 shadow-sm z-10 flex-shrink-0 ${isDark ? 'bg-[#0F172A]/80 backdrop-blur-md border-b border-slate-800/50 text-gray-200' : 'bg-white border-b border-gray-200'}`}>
              <div className="flex items-center space-x-4">
                <h1 className="font-bold text-[14px]">欢迎，西安和硕物流科技有限公司</h1>
                <div className="text-[11px] font-mono text-gray-500 bg-gray-100 dark:bg-slate-900 px-2.5 py-1 rounded-full border border-gray-200 dark:border-slate-800">
                  {formatDate(time)}
                </div>
              </div>
              <div className="flex items-center space-x-3">
                <span className="text-xs text-gray-400">操作日志</span>
                <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-accent to-blue-600 flex items-center justify-center shadow">
                  <span className="text-white font-bold text-sm">李</span>
                </div>
              </div>
            </div>

            {/* 核心工作流网格 (紧凑一屏) */}
            <div className="flex-1 p-4 grid grid-cols-12 gap-4 overflow-hidden h-full min-h-0">

              {/* 左侧 (Col-4): 商品编辑区 (恢复上个版本大间距与详情布局) */}
              <div className="col-span-4 space-y-6 flex flex-col h-full overflow-y-auto hide-scrollbar">
                <div className={`rounded-xl shadow-xl border transition-all ${isDark ? 'bg-[#0F172A] border-slate-800' : 'bg-white border-gray-200'} p-6 flex flex-col`}>

                  {/* 悬停约束条件交互 */}
                  <div className="flex items-center justify-between mb-5 border-b border-dashed border-gray-300 dark:border-slate-700 pb-4">
                    <Tooltip content={
                      <div className="space-y-1">
                        <p className="font-bold text-amber-400 flex items-center text-sm border-b border-slate-700 pb-2 mb-2">
                          <span className="mr-2">⚠️</span> 启动拍卖前置约束
                        </p>
                        <p className="text-gray-300 leading-relaxed text-xs">需有 <span className="text-white font-bold">3 家及以上买家</span>准备好方可开始拍卖，同时需支付保证金 <span className="text-white font-bold">2 万元</span>。</p>
                      </div>
                    }>
                      <h2 className="text-lg font-black flex items-center cursor-help group">
                        <span className="w-1.5 h-6 bg-accent rounded mr-3"></span>
                        产品发布介绍
                        <span className="ml-3 px-2 py-0.5 text-[10px] bg-slate-100 dark:bg-slate-800 text-gray-500 rounded border border-gray-200 dark:border-slate-700 opacity-50 group-hover:opacity-100 transition-all shadow-sm">将鼠标悬停查看约束</span>
                      </h2>
                    </Tooltip>
                    <span className="bg-blue-500/10 text-accent text-xs px-2.5 py-1.5 rounded-md border border-accent/20 font-bold">编辑中状态</span>
                  </div>

                  {/* 要求还原卡片：6个指标带修改按钮 */}
                  <div className={`rounded-lg p-5 mb-6 relative group ${isDark ? 'bg-slate-900 border border-slate-800' : 'bg-gray-50 border border-gray-100'}`}>
                    <h3 className="text-xs font-bold mb-4 text-gray-500 dark:text-gray-400 tracking-[0.2em]">关键产品成分指标</h3>
                    <div className="grid grid-cols-2 gap-4">
                      {[
                        { k: '发热值', v: '5500k', color: 'text-orange-500' },
                        { k: '含硫量', v: '≤0.02', color: 'text-rose-500' },
                        { k: '水分', v: '12%以下', color: 'text-sky-500' },
                        { k: '灰分', v: '≤10%', color: 'text-stone-500' },
                        { k: '挥发分', v: '20-30%', color: 'text-amber-500' },
                        { k: '固定碳', v: '≥50%', color: 'text-gray-700 dark:text-gray-300' }
                      ].map(item => (
                        <div key={item.k} className={`p-3 rounded-md border transition-all group/item cursor-pointer flex justify-between items-center ${isDark ? 'bg-slate-800/50 border-slate-700 hover:border-slate-500 hover:bg-slate-800' : 'bg-white border-gray-200 hover:border-accent hover:shadow-md'}`}>
                          <div>
                            <div className="text-[11px] text-gray-400 mb-0.5">{item.k}</div>
                            <div className={`font-black text-lg ${item.color} font-mono tracking-tight`}>{item.v}</div>
                          </div>
                          {/* 交互：+修改 按钮显示 */}
                          <button className="opacity-0 group-hover/item:opacity-100 transition-opacity text-[11px] bg-accent text-white px-2 py-1.5 rounded hover:bg-blue-600 shadow-md">
                            + 修改
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* 拍卖逻辑展示区块 */}
                  <div className="space-y-4 mb-8">
                    <h3 className="text-xs font-bold text-gray-500 dark:text-gray-400 tracking-[0.2em] flex items-center">
                      <span className="mr-3 border-t flex-1 border-gray-300 dark:border-slate-800"></span>
                      拍卖核心逻辑配置
                      <span className="ml-3 border-t flex-1 border-gray-300 dark:border-slate-800"></span>
                    </h3>

                    <div className="grid grid-cols-2 gap-4">

                      <div className={`p-5 rounded-xl border col-span-2 flex items-center justify-between ${isDark ? 'bg-gradient-to-r from-slate-900 to-slate-800 border-slate-700 shadow-[inset_0_1px_0_rgba(255,255,255,0.05)]' : 'bg-gradient-to-r from-blue-50 to-white border-blue-200 shadow-inner'}`}>
                        <div>
                          <p className="text-[11px] text-gray-500 tracking-wider">最高/最低 标价限制</p>
                          <div className="flex items-baseline mt-1 space-x-2">
                            <span className="text-3xl font-black text-rose-500 font-mono">850</span>
                            <span className="text-gray-400 font-light text-xl">/</span>
                            <span className="text-xl font-bold text-emerald-500 font-mono">750</span>
                            <span className="text-xs text-gray-500 ml-1">元/吨</span>
                          </div>
                        </div>
                        <div className="h-10 w-10 border border-dashed border-gray-400 dark:border-slate-600 rounded flex items-center justify-center text-gray-400 cursor-pointer hover:border-accent hover:text-accent transition">
                          ✎
                        </div>
                      </div>

                      <div className={`p-4 rounded-xl border flex flex-col justify-center items-center text-center shadow-sm ${isDark ? 'bg-slate-800/80 border-slate-700/80' : 'bg-white border-gray-200'}`}>
                        <span className="text-[11px] text-gray-500 tracking-wider mb-2">可供拍卖库存</span>
                        <div className="flex items-baseline">
                          <span className="text-2xl font-black font-mono dark:text-white">10</span>
                          <span className="text-xs ml-1 text-gray-500 font-bold">万吨</span>
                        </div>
                      </div>

                      <div className={`p-4 rounded-xl border flex flex-col justify-center items-center text-center shadow-sm ${isDark ? 'bg-slate-800/80 border-slate-700/80' : 'bg-white border-gray-200'}`}>
                        <span className="text-[11px] text-gray-500 tracking-wider mb-2">自动签约熔断价</span>
                        <div className="flex items-baseline">
                          <span className="text-2xl font-black font-mono text-accent">850</span>
                          <span className="text-xs ml-1 text-gray-500 font-bold">元/吨</span>
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 操作按钮组 */}
                  <div className="mt-auto flex gap-4">
                    <button className="flex-[1] bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 font-bold py-3.5 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-700 border border-transparent dark:border-slate-700 transition">存入草稿箱</button>
                    <button className="flex-[2] bg-accent text-white font-bold py-3.5 rounded-lg hover:bg-blue-600 shadow-lg shadow-blue-500/20 text-base transition ring-1 ring-blue-400 dark:ring-blue-800/50">保存并发布拍卖</button>
                  </div>
                </div>
              </div>

              {/* 中间 (Col-5): 走势图表 + 大盘汇总 */}
              <div className="col-span-5 flex flex-col gap-4 h-full overflow-hidden">

                {/* 图表展示区 */}
                <div className={`flex-[4] min-h-0 rounded-xl shadow-lg border flex flex-col p-4 relative ${isDark ? 'bg-[#0F172A] border-slate-800' : 'bg-white border-gray-200'}`}>
                  <div className="flex justify-between items-center mb-2">
                    <h2 className="text-[14px] font-black flex items-center">
                      <span className="w-1.5 h-4 bg-purple-500 rounded mr-2"></span>
                      大盘成交走势
                    </h2>
                    <select className="bg-transparent border border-gray-200 dark:border-slate-700 text-[10px] py-1 px-2 rounded opacity-80 outline-none">
                      <option>近7天</option>
                    </select>
                  </div>

                  <div className="flex-1 relative flex items-end p-1 space-x-[3px] bg-gradient-to-t from-gray-50 to-transparent dark:from-slate-800/20 rounded">
                    <div className="absolute inset-0 flex flex-col justify-between py-2 pointer-events-none opacity-50">
                      {[1, 2, 3, 4].map(i => <div key={i} className="border-b border-dashed border-gray-200 dark:border-slate-700 w-full"></div>)}
                    </div>
                    {[40, 60, 45, 80, 50, 95, 100, 70, 55, 85].map((h, i) => (
                      <div key={i} className="relative flex-1 bg-gradient-to-t from-indigo-500 to-cyan-400 rounded-t-sm opacity-90 hover:opacity-100 group" style={{ height: `${h}%` }}>
                        <div className="absolute -top-6 left-1/2 transform -translate-x-1/2 opacity-0 group-hover:opacity-100 text-[9px] font-bold text-white bg-slate-800 px-1 rounded shadow z-10">{h * 10}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* KPI/场次状态 卡片 */}
                <div className="flex-[1] min-h-0 grid grid-cols-2 gap-4">
                  <div className={`rounded-xl shadow-sm border p-3 flex flex-col justify-center ${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-gray-200'}`}>
                    <div className="text-[10px] text-gray-500">今日围观人次</div>
                    <div className="text-xl font-black text-indigo-500 font-mono">1,402</div>
                    <span className="text-[9px] text-emerald-500 mt-1">↑ 12% 较昨日</span>
                  </div>
                  <div className={`rounded-xl shadow-sm border p-3 flex flex-col justify-center ${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-gray-200'}`}>
                    <div className="text-[10px] text-gray-500">当前拍卖场次</div>
                    <div className="text-xl font-black text-amber-500 font-mono">12</div>
                    <span className="text-[9px] text-gray-400 mt-1">含 2 场即将结拍</span>
                  </div>
                </div>

                {/* 底部售卖汇总大盘合集 (转移至中栏) */}
                <div className="flex-[2] min-h-0 rounded-xl shadow-lg border overflow-hidden relative">
                  <div className={`absolute inset-0 ${isDark ? 'bg-gradient-to-br from-blue-900/90 to-[#1e1b4b]' : 'bg-gradient-to-br from-blue-600 to-indigo-700'}`}></div>
                  <div className="relative p-4 h-full flex flex-col justify-between text-white z-10">
                    <h2 className="text-[12px] font-bold flex items-center uppercase opacity-80 mb-2">平台售卖核心指标</h2>
                    <div className="flex justify-between items-end">
                      <div>
                        <div className="text-[10px] text-blue-200/80 font-bold mb-1">周期总订单售卖额（万元）</div>
                        <div className="text-3xl font-black font-mono leading-none drop-shadow-md flex items-baseline">
                          12,560<span className="text-lg text-blue-200 ml-0.5">.00</span>
                        </div>
                      </div>
                      <div className="text-right">
                        <div className="text-[10px] text-blue-200/80 font-bold mb-1">活跃买家数</div>
                        <div className="text-xl font-bold font-mono">63 <span className="text-[10px] font-normal">家</span></div>
                      </div>
                    </div>
                  </div>
                </div>

              </div>

              {/* 右侧 (Col-3): 动态列表 & 资金卡片等 */}
              <div className="col-span-3 flex flex-col gap-4 h-full overflow-hidden">

                {/* 资金及账户概览卡片 */}
                <div className={`flex-shrink-0 rounded-xl shadow border p-4 ${isDark ? 'bg-gradient-to-br from-[#0F172A] to-slate-900 border-slate-800' : 'bg-white border-gray-200'}`}>
                  <h2 className="text-[13px] font-black mb-3 border-b border-gray-200 dark:border-slate-800 pb-2">资金与授信总览</h2>
                  <div className="space-y-2.5">
                    <div className="flex flex-col">
                      <span className="text-[10px] font-bold text-gray-500">账户中心余额</span>
                      <span className="font-mono font-black text-lg text-emerald-500 leading-none mt-0.5">¥ 1,200,000</span>
                    </div>
                    <div className="flex flex-col">
                      <span className="text-[10px] font-bold text-gray-500">平台授信额度</span>
                      <span className="font-mono font-black text-lg text-blue-500 leading-none mt-0.5">¥ 5,000,000</span>
                    </div>
                  </div>
                </div>

                {/* 实时动态最新成交 (一屏化核心目标，高度自适应) */}
                <div className={`flex-1 min-h-0 rounded-xl shadow-lg border flex flex-col overflow-hidden relative ${isDark ? 'bg-[#0F172A] border-slate-800' : 'bg-white border-gray-200'}`}>
                  <div className={`p-3 flex justify-between items-center z-10 border-b shadow-sm ${isDark ? 'bg-slate-900/50 border-slate-800' : 'bg-gray-50/80 border-gray-100 backdrop-blur'}`}>
                    <h2 className="text-[13px] font-black flex items-center">
                      <span className="w-1.5 h-3 bg-emerald-500 rounded mr-2"></span>实时最新成交
                    </h2>
                    <div className="flex items-center text-[9px] font-bold text-emerald-500 px-1 py-0.5 rounded border border-emerald-500/20">LIVE</div>
                  </div>

                  {/* 无缝滚动区域：固定在伸缩容器内 */}
                  <div className="flex-1 overflow-hidden relative break-inside-avoid">
                    <div className="absolute top-0 left-0 right-0 h-4 bg-gradient-to-b from-white dark:from-[#0F172A] to-transparent z-10 pointer-events-none"></div>
                    <div className="absolute bottom-0 left-0 right-0 h-6 bg-gradient-to-t from-white dark:from-[#0F172A] to-transparent z-10 pointer-events-none"></div>

                    <div className="animate-scroll pt-1 w-full flex flex-col">
                      {allTx.map((tx, i) => (
                        <div key={i} className={`flex flex-col justify-center px-3 py-2 mx-3 my-1.5 rounded border-l-[3px] flex-shrink-0 transition-colors ${isDark ? 'bg-slate-800/40 border-accent/80 hover:bg-slate-800' : 'bg-white border-accent shadow-sm'}`}>
                          <div className="flex justify-between items-baseline mb-1">
                            <span className="font-bold text-[12px]">{tx.buyer}</span>
                            <span className="font-mono text-base font-black text-rose-500 leading-none">{tx.price}</span>
                          </div>
                          <div className="flex justify-between items-center">
                            <span className="text-[9px] text-gray-500">{tx.time} 达成</span>
                            <span className="text-[9px] text-gray-400">元/吨</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>

</html>
