<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>大宗交易平台全链路画像 (业务主轴贯穿版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <!-- 动态连线库 -->
  <script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>

  <style>
    body {
      background-color: #f4f6f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* 卡片顶部饰边 */
    .card-top-blue { border-top: 6px solid #3b82f6; }
    .card-top-green { border-top: 6px solid #22c55e; }
    .card-top-orange { border-top: 6px solid #f97316; }
    .card-top-purple { border-top: 6px solid #a855f7; }
    .card-top-yellow { border-top: 6px solid #eab308; }

    /* 通用卡片底子 */
    .persona-card {
      background: white;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      z-index: 10;
      position: relative;
    }

    /* 中心平台方特殊发光发热动效 */
    .hub-glow {
      box-shadow: 0 0 40px -5px rgba(168, 85, 247, 0.5);
      animation: pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 30px -5px rgba(168, 85, 247, 0.4); }
      50% { box-shadow: 0 0 50px 5px rgba(168, 85, 247, 0.7); }
    }

    .leader-line-label {
      font-size: 11px;
      font-weight: bold;
      color: #1e293b;
      background: rgba(255, 255, 255, 0.9);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
      pointer-events: none;
    }
  </style>
</head>
<body class="m-0 p-0 overflow-y-auto overflow-x-hidden min-h-screen pb-32">

  <!-- 头部与图例区 -->
  <header class="text-center py-10 relative z-20">
    <h1 class="text-4xl font-black text-slate-800 mb-4 tracking-wide">大宗业务全局生命周期闭环</h1>
    <p class="text-[15px] text-gray-500 font-medium tracking-wide">商品解释权的让渡重构主轴贯穿图</p>
  </header>

  <!-- 核心 3x3 放射状网格 -->
  <main class="grid grid-cols-3 grid-rows-3 gap-x-8 gap-y-10 w-full max-w-[1400px] mx-auto px-4 relative z-10 pt-4">

    <!-- ========== Top Left: 卖家/货主 ========== -->
    <div id="node-seller" class="persona-card card-top-blue col-start-1 row-start-1 h-28 flex justify-center items-center hover:-translate-y-1 transition-transform">
      <h2 class="text-[20px] font-black flex items-center text-blue-500 m-0 border-none">
        <i class="fas fa-cube mr-3 text-lg"></i>货主/源头
      </h2>
    </div>

    <!-- ========== Top Right: 买家 ========== -->
    <div id="node-buyer" class="persona-card card-top-green col-start-3 row-start-1 h-28 flex justify-center items-center hover:-translate-y-1 transition-transform ml-auto">
      <h2 class="text-[20px] font-black flex items-center text-green-500 m-0 border-none">
        <i class="fas fa-shopping-cart mr-3 text-lg"></i>工业终端买家
      </h2>
    </div>

    <!-- ========== Center Row: 平台与生命周期主轴 ========== -->
    <div class="col-start-1 col-span-3 row-start-2 flex flex-col items-center justify-center gap-10 w-full max-w-[1300px] mx-auto relative z-30 pt-4 pb-4">
      
      <!-- 平台管理方悬浮中心 -->
      <div id="node-platform" class="persona-card h-28 flex justify-center items-center ring-4 ring-purple-500 hub-glow transform scale-110 z-50 bg-white">
        <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-purple-600 text-white text-[10px] px-3 py-1 font-black rounded-full whitespace-nowrap shadow-md tracking-wider">
          核心裁夺者
        </div>
        <h2 class="text-[22px] font-black flex items-center text-purple-600 m-0 border-none">
          <i class="fas fa-shield-alt mr-3 text-lg"></i>平台管理方
        </h2>
      </div>

      <!-- 四大阶段生命周期闭环主干道 -->
      <div id="pipeline" class="w-full bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 rounded-3xl p-6 shadow-2xl border border-slate-700 flex justify-between items-center relative overflow-hidden">
        <!-- 背景连接导轨 -->
        <div class="absolute left-10 right-10 top-1/2 -translate-y-1/2 h-2 bg-slate-700 z-0 rounded-full"></div>
        
        <!-- 阶段 1 -->
        <div id="step-1" class="relative z-10 w-56 bg-slate-800 border-2 border-slate-600 hover:border-blue-400 rounded-xl p-4 flex flex-col items-center text-center shadow-[0_0_15px_rgba(59,130,246,0.15)] transition-colors">
          <span class="text-blue-400 font-black text-[11px] mb-1 tracking-widest uppercase">STATE 1 / 打破黑箱</span>
          <span class="text-white font-bold text-sm">底层物料指标上链</span>
        </div>
        
        <!-- 阶段 2 -->
        <div id="step-2" class="relative z-10 w-56 bg-slate-800 border-2 border-slate-600 hover:border-purple-400 rounded-xl p-4 flex flex-col items-center text-center shadow-[0_0_15px_rgba(168,85,247,0.15)] transition-colors">
          <span class="text-purple-400 font-black text-[11px] mb-1 tracking-widest uppercase">STATE 2 / 确立锚点</span>
          <span class="text-white font-bold text-sm">平台审核与标品化</span>
        </div>

        <!-- 阶段 3 -->
        <div id="step-3" class="relative z-10 w-56 bg-slate-800 border-2 border-slate-600 hover:border-emerald-400 rounded-xl p-4 flex flex-col items-center text-center shadow-[0_0_15px_rgba(16,185,129,0.15)] transition-colors">
          <span class="text-emerald-400 font-black text-[11px] mb-1 tracking-widest uppercase">STATE 3 / 现实锚定</span>
          <span class="text-white font-bold text-sm">物理仓储与硬向查封</span>
        </div>

        <!-- 阶段 4 -->
        <div id="step-4" class="relative z-10 w-56 bg-slate-800 border-2 border-slate-600 hover:border-yellow-400 rounded-xl p-4 flex flex-col items-center text-center shadow-[0_0_15px_rgba(234,179,8,0.15)] transition-colors">
          <span class="text-yellow-400 font-black text-[11px] mb-1 tracking-widest uppercase">STATE 4 / 最终裂变</span>
          <span class="text-white font-bold text-sm">资产包裹信流转</span>
        </div>
      </div>
    </div>

    <!-- ========== Bottom Left: 库方 ========== -->
    <div id="node-warehouse" class="persona-card card-top-orange col-start-1 row-start-3 h-28 flex justify-center items-center hover:-translate-y-1 transition-transform">
      <h2 class="text-[20px] font-black flex items-center text-orange-500 m-0 border-none">
        <i class="fas fa-warehouse mr-3 text-lg"></i>库方/三方质检
      </h2>
    </div>

    <!-- ========== Bottom Right: 资金方 ========== -->
    <div id="node-finance" class="persona-card card-top-yellow col-start-3 row-start-3 h-28 flex justify-center items-center hover:-translate-y-1 transition-transform ml-auto">
      <h2 class="text-[20px] font-black flex items-center text-yellow-500 m-0 border-none">
        <i class="fas fa-dollar-sign mr-3 text-lg"></i>金融授信方
      </h2>
    </div>

  </main>

  <script>
    let lines = [];

    function makeLabel(text, colorHex) {
      return LeaderLine.captionLabel({
        text: text, 
        color: '#1e293b',
        outlineColor: '#fff',
        fontSize: '11px',
        fontWeight: 'bold',
        padding: '4px 8px',
        borderRadius: '6px'
      });
    }

    function initLines() {
      // CLEAR old lines
      lines.forEach(l => l.remove());
      lines = [];

      const Seller = document.getElementById('node-seller');
      const Buyer = document.getElementById('node-buyer');
      const Platform = document.getElementById('node-platform');
      const Warehouse = document.getElementById('node-warehouse');
      const Finance = document.getElementById('node-finance');

      const S1 = document.getElementById('step-1');
      const S2 = document.getElementById('step-2');
      const S3 = document.getElementById('step-3');
      const S4 = document.getElementById('step-4');

      if (!Seller || !S1) return;

      try {
        // [1] 货主 -> 阶段1：提交指标让渡解释权
        lines.push(new LeaderLine(Seller, S1, { color: '#3b82f6', size: 3, path: 'fluid', startSocket: 'bottom', endSocket: 'top', 
          dropShadow: true, middleLabel: makeLabel('提交指标让渡初始解释权', '#3b82f6') }));
        
        // [2] 平台 -> 阶段2：平台掌控标品化
        lines.push(new LeaderLine(Platform, S2, { color: '#a855f7', size: 3.5, path: 'straight', startSocket: 'bottom', endSocket: 'top', 
          dash: {animation: true}, dropShadow: true, middleLabel: makeLabel('权威解释模型介入', '#a855f7') }));
          
        // [3] 平台 -> 阶段3：平台下达云锁指令
        lines.push(new LeaderLine(Platform, S3, { color: '#eab308', size: 3, path: 'arc', startSocket: 'bottom', endSocket: 'top', 
          dropShadow: true, middleLabel: makeLabel('跨机构下达云锁解押', '#eab308') }));

        // [4] 库方 -> 阶段3：物理硬核实控闭环
        lines.push(new LeaderLine(Warehouse, S3, { color: '#f97316', size: 3, path: 'fluid', startSocket: 'top', endSocket: 'bottom', 
          dropShadow: true, middleLabel: makeLabel('账实相符/生成不可篡改仓单', '#f97316') }));

        // [5] 资金 -> 阶段4：授信赋能加注
        lines.push(new LeaderLine(Finance, S4, { color: '#eab308', size: 3, path: 'fluid', startSocket: 'top', endSocket: 'bottom', 
          dropShadow: true, middleLabel: makeLabel('背书增信/白条支持放款', '#eab308') }));

        // [6] 阶段4 -> 买家：完结
        lines.push(new LeaderLine(S4, Buyer, { color: '#22c55e', size: 4, path: 'fluid', startSocket: 'top', endSocket: 'bottom', 
          dash: {animation: true}, dropShadow: true, middleLabel: makeLabel('标准化资产货权交割', '#22c55e') }));

      } catch (e) {
        console.error("LeaderLine failed:", e);
      }
    }

    // Delay slightly to ensure fonts and layout finish rendering
    window.addEventListener('load', () => setTimeout(initLines, 400));
    
    // Maintain lines on resize
    window.addEventListener('resize', () => {
      lines.forEach(l => l.position());
    });
  </script>
</body>
</html>
